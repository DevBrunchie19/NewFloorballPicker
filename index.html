<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floorball Team Picker</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 40px auto;
  padding: 20px;
  background: #f9f9f9;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h1 {
  padding: 12px;
  background: #3a52a3;
  text-align: center;
  border-radius: 8px;
  color: #fff;
  font-size: clamp(1.5rem, 5vw, 2rem);
}

.tagline{
  text-align:center;
  margin-top:-6px;
  margin-bottom:18px;
  color:#555;
  font-size:0.95rem;
}

  /* ===== CARD STYLES ===== */
.card{
  background:#ffffff;
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
  border:1px solid #ececec;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

.card h3{
  margin-top:0;
  margin-bottom:10px;
  font-size:1rem;
  color:#333;
}

/* CHIP STYLES */
textarea, input {
  width: 100%;
  display: block;
  margin: 6px auto 12px auto;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 1rem;
  box-sizing: border-box;
}
textarea { resize: none; min-height: 100px; }

.chips-container { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 12px 0; }
.chip { padding:8px 14px; background:#e0e0e0; border-radius:20px; cursor:pointer; font-size:0.95rem; transition:all 0.2s ease; user-select:none; }
.chip:hover { background:#d0d0d0; }
.chip.selected { background:#3a52a3; color:white; box-shadow:0 2px 6px rgba(0,0,0,0.15); }

.team-size-container { display:flex; gap:8px; margin:6px 0 12px 0; }

.button-wrapper { display: flex; justify-content: center; margin-top:10px; }
.image-button {
  display: block;
  margin: 0 auto;
  width: 85px;
  height: auto;
  cursor: pointer;
  filter: invert(29%) sepia(74%) saturate(488%) hue-rotate(189deg) brightness(100%) contrast(103%);
  transition: transform 0.15s ease;
}
.image-button:hover { transform: scale(1.1); }
.image-button:active { transform: scale(0.95); }

#buttonText { 
  text-align:center; 
  font-size:0.95rem; 
  color:#555; 
  margin-top:10px; }
   
  .team { 
     background: rgb(184 184 184 / 0%);
      padding: 12px; 
      margin:50px 0;
      border-radius: 8px; 
      border: 2px dotted #1d1d1d0f;
      --team-colour: #3a52a3; 
    }
  
    .chips-header { 
      display:flex; 
      justify-content:space-between; 
      align-items:center; 
      margin-bottom:6px; 
    }
  
    #clearChipsBtn {
      background: #3a52a3; 
      color:white; 
      border:none; 
      border-radius:16px;
      padding:6px 12px;
      cursor:pointer; 
      font-size:0.9rem;
      transition: background 0.2s ease, transform 0.1s ease, opacity 0.3s ease;
      opacity:0;
      pointer-events:none;
    }
  
    #clearChipsBtn.visible { opacity:1; pointer-events:auto; }
    #clearChipsBtn:hover { background:#516fd3; }
    #clearChipsBtn:active { transform:scale(0.95); }
    .chips-container { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 12px 0; }
    .chip { padding:8px 14px; background:#e0e0e0; border-radius:20px; cursor:pointer; font-size:0.95rem; transition:all 0.2s ease; user-select:none; }
    .chip:hover { background:#d0d0d0; }
    .chip.selected { background:#3a52a3; color:white; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
    .team-size-container { display:flex; gap:8px; margin:6px 0 12px 0; }
    .team-title { 
      font-size:1.2rem; 
      font-weight:bold; 
      text-align:start; 
      margin-bottom:10px; 
    }
  
  .formation-container { 
      display:flex; 
      flex-direction:column; 
      align-items: flex-start;
      width:100%; 
    }
    
  
  .formation-layout{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}



#pitch {
  position: relative;
  width: 100%;
  height: 400px;           /* taller for tactical layout */
  border-radius: 12px;
  background-color: #3aa14f; /* green pitch color */
  overflow: hidden;
  border: 2px solid #2d8b3b;

  /* ===== Background layers ===== */
  background-image:
    /* Center line */
    linear-gradient(
      to bottom,
      transparent 49.5%,
      #fff 50%,
      transparent 50.5%
    ),

    /* Center circle */
    radial-gradient(
      circle at 50% 50%,
      transparent 0%,
      transparent 12%, /* inner radius */
      #fff 13%,        /* circle line */
      transparent 14%
    ),

    /* Goal areas (top and bottom) */
    linear-gradient(
      to bottom,
      rgba(230,243,255,0.6) 0%,
      rgba(230,243,255,0.6) 10%,
      transparent 10%,
      transparent 90%,
      rgba(230,243,255,0.6) 90%,
      rgba(230,243,255,0.6) 100%
    ),

    /* Side boundaries (optional subtle lines) */
    linear-gradient(
      to right,
      transparent 5px,
      rgba(255,255,255,0.15) 5px,
      rgba(255,255,255,0.15) calc(100% - 5px),
      transparent calc(100% - 5px)
    ),

    /* Subtle floor texture */
    radial-gradient(
      rgba(255,255,255,0.05) 1px,
      transparent 1px
    );

  /* ===== Background repeat & size ===== */
  background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, repeat;
  background-size:
    100% 100%,  /* center line */
    100% 100%,  /* center circle */
    100% 100%,  /* goal areas */
    100% 100%,  /* side boundaries */
    40px 40px;  /* floor texture */
}

  
    .subs-section.visible { display:block; }
    .sub-card {
      padding:6px 10px;
      border:1px solid #ccc;
      border-radius:6px;
      background:#fff;
      margin:6px auto;
      display:inline-block;
    }
    .row-center { display:flex; flex-direction:column; align-items:center; }
    .row-two { width:80%; display:flex; justify-content:space-between; }
    .row-three { width:100%; display:flex; justify-content:space-between; }
    .player-block { display:flex; flex-direction:column; align-items:center; }
    .player-icon {
      width:80px;

      border:2px dashed rgb(0 0 0 / 0%);

      display:flex;
      align-items:center;
      justify-content:center;
      background-color:white;

    .shirt-icon { width:70%; height:70%; display:flex; align-items:center; justify-content:center; line-height:0; }
    .shirt-icon svg { width: 100%; height: 100%; display:block; preserveAspectRatio: xMidYMid meet; color: var(--team-colour); }
    .shirt-icon svg [fill] { fill: currentColor; }
    .player-name { margin-top:6px; font-weight:600; text-align:center; }
    .hat-icon {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: auto;
      pointer-events: none; 
    }
    .hat-icon img { width: 100%; height: auto; display: block; }
    @media (max-width:640px) { .formation-layout { gap:16px; } } 

    /* ===== MODAL ===== */
  .modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.modal.visible {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: #f9f9f9;
  width: 95%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  border-radius: 16px;
  padding: 20px;
  position: relative;

  transform: scale(0.9);
  opacity: 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

.modal.visible .modal-content {
  transform: scale(1);
  opacity: 1;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 14px;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
}

#generating {
  text-align: center;
  font-size: 1.1rem;
  color: #666;
  padding: 30px 0;
}


/* ===== COLLAPSIBLE STYLES ===== */
.collapsible-content { display: none; margin-top: 8px; transition: all 0.3s ease; }
.collapse-toggle {
  all: unset;
  cursor: pointer;
  font-weight: bold;
  font-size: 1rem;
  color: #3a52a3;
}

  </style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* ===== COLLAPSIBLE JS ===== */
function toggleExtraPlayers(button) {
  const content = document.getElementById("extraPlayersContent");
  const isOpen = content.style.display === "block";
  content.style.display = isOpen ? "none" : "block";
  button.textContent = isOpen ? "Add Extra Players ⯆" : "Add Extra Players ⯅";
}

const commonPlayers=["Brunchie","Colin W-B","Nabber","Ben","Bill","Ron"];
const unusualPlayers=["Dawn"];  
const goalies=["Sam","Colin D","Cloth G"];

/* =========================
   NEW: team history storage
========================= */

const TEAM_HISTORY_KEY = "floorball_team_history";

function getTeamHistory(){
  return JSON.parse(localStorage.getItem(TEAM_HISTORY_KEY) || "[]");
}

function saveTeamHistory(teams){
  const history = getTeamHistory();

  history.push({
    date: new Date().toISOString(),
    teams
  });

  if(history.length > 50){
    history.shift();
  }

  localStorage.setItem(TEAM_HISTORY_KEY, JSON.stringify(history));
}

function countRepeatPairings(teams){

  const history = getTeamHistory();

  let penalty = 0;

  for(const pastSession of history){

    for(let i = 0; i < teams.length; i++){

      const currentTeam =
        teams[i].map(p=>p.replace(" (G)",""));

      const pastTeam =
        pastSession.teams[i] || [];

      for(const playerA of currentTeam){

        for(const playerB of currentTeam){

          if(playerA === playerB) continue;

          if(
            pastTeam.includes(playerA) &&
            pastTeam.includes(playerB)
          ){
            penalty += 1;
          }

        }

      }

    }

  }

  return penalty;
}

/* ========================= */

function createPlayerChips(){
  createChips(commonPlayers,"playerChips",togglePlayer);
}

function createUnusualPlayerChips(){
  createChips(unusualPlayers,"unusualChips",togglePlayer);
}  

function createGoalieChips(){
  createChips(goalies,"goalieChips",toggleGoalie);
}

function createChips(list,containerId,handler){

  const c=document.getElementById(containerId);

  c.innerHTML="";

  list.forEach(n=>{

    const chip=document.createElement("div");

    chip.className="chip";

    chip.textContent=n;

    chip.onclick=()=>handler(n,chip);

    c.appendChild(chip);

  });

}

function togglePlayer(name,chip){

  const t=document.getElementById("names");

  let n=
    t.value
    .split(",")
    .map(x=>x.trim())
    .filter(Boolean);

  if(n.includes(name)){

    n=n.filter(x=>x!==name);

    chip.classList.remove("selected");

  }else{

    n.push(name);

    chip.classList.add("selected");

  }

  t.value=n.join(", ");

  updateClearButtonVisibility();

}

function toggleGoalie(name,chip){

  chip.classList.toggle("selected");

  updateClearButtonVisibility();

}

function buildFinalPlayerPool(){

  return document
    .getElementById("names")
    .value
    .split(",")
    .map(n=>n.trim())
    .filter(Boolean);

}

function getSelectedGoalies(){

  return Array
    .from(
      document.querySelectorAll(
        "#goalieChips .chip.selected"
      )
    )
    .map(c=>c.textContent.trim());

}

function selectTeamSize(size,chip){

  document.getElementById("teamSize").value=size;

  document
    .querySelectorAll(
      ".team-size-container .chip"
    )
    .forEach(c=>c.classList.remove("selected"));

  chip.classList.add("selected");

}

function clearAllPlayers(){

  document.getElementById("names").value="";

  document
    .querySelectorAll(
      "#playerChips .chip, #unusualChips .chip, #goalieChips .chip"
    )
    .forEach(c=>c.classList.remove("selected"));

  updateClearButtonVisibility();

}

function updateClearButtonVisibility(){

  const has=
    buildFinalPlayerPool().length>0 ||
    getSelectedGoalies().length>0;

  document
    .getElementById("clearChipsBtn")
    .classList.toggle("visible",has);

}

function shuffle(a){

  for(let i=a.length-1;i>0;i--){

    const j=Math.floor(Math.random()*(i+1));

    [a[i],a[j]]=[a[j],a[i]];

  }

}

function generateTeams(){

  let players=
    buildFinalPlayerPool();

  const selectedGoalies=
    getSelectedGoalies();

  const teamSize=
    parseInt(
      document
      .getElementById("teamSize")
      .value,
      10
    );

  if(!teamSize || teamSize<1){

    alert("Enter valid team size.");

    return;

  }

  const modal =
  document.getElementById("teamsModal");

const pitch =
  document.getElementById("pitch");

const toolbar =
  document.getElementById("exportToolbar");

modal.classList.add("visible");

toolbar.style.display="none";

pitch.innerHTML =
  `<div id="generating">
    Generating teams…
  </div>`;

  
  setTimeout(()=>{

    if(selectedGoalies.length){

      const gSet=
        new Set(
          selectedGoalies.map(
            g=>g.toLowerCase()
          )
        );

      players=
        players.filter(
          p=>!gSet.has(p.toLowerCase())
        );

    }

    /* =========================
       CHANGED: smarter drafting
    ========================= */

    const numTeams = 2;

    let bestDraft = null;

    let lowestPenalty = Infinity;

    for(let attempt = 0; attempt < 40; attempt++){

      const shuffled=[...players];

      shuffle(shuffled);

      const teams=
        Array.from(
          {length:numTeams},
          ()=>[]
        );

      const subsPerTeam=
        Array.from(
          {length:numTeams},
          ()=>[]
        );

      for(let i=0;i<numTeams;i++){

        if(selectedGoalies.length){

          teams[i].push(
            selectedGoalies[
              i%selectedGoalies.length
            ]+" (G)"
          );

        }

      }

      let currentTeam=0;

      for(const player of shuffled){

        const skaters=
          teams[currentTeam]
          .filter(
            p=>!p.includes("(G)")
          )
          .length;

        if(skaters<teamSize){

          teams[currentTeam].push(player);

        }else{

          subsPerTeam[currentTeam].push(player);

        }

        currentTeam=
          (currentTeam+1)%numTeams;

      }

      const penalty=
        countRepeatPairings(teams);

      if(penalty<lowestPenalty){

        lowestPenalty=penalty;

        bestDraft={
          teams,
          subsPerTeam
        };

      }

    }

    renderTeams(
      bestDraft.teams,
      teamSize,
      bestDraft.subsPerTeam
    );

    /* NEW: save history */

    saveTeamHistory(
      bestDraft.teams.map(
        team =>
          team.map(
            p=>p.replace(" (G)","")
          )
      )
    );

    toolbar.style.display="flex";

    if(!navigator.share){

      document
      .getElementById("shareTeamsBtn")
      .style.display="none";

    }

  },600);

}

function closeTeamsModal(){

  document
    .getElementById("teamsModal")
    .classList.remove("visible");

}

function checkOutsideClick(e){

  if(e.target.id==="teamsModal")
    closeTeamsModal();

}

/* existing colour logic */

function teamColourByIndex(index,totalTeams){

  const offset=
    Math.floor(Math.random()*360);

  const hue=
    (offset +
      (360/totalTeams)*index)%360;

  return `hsl(${hue} 65% 48%)`;

}

/* rest unchanged */

function injectShirtsIntoTeam(teamEl){

  const template=
    document.getElementById('shirt-template');

  if(!template) return;

  const wrappers=
    teamEl.querySelectorAll('.shirt-icon');

  wrappers.forEach(w=>{

    const clone=
      template.cloneNode(true);

    clone.removeAttribute('id');

    clone.style.display='block';

    clone.removeAttribute('width');

    clone.removeAttribute('height');

    clone.setAttribute(
      'preserveAspectRatio',
      'xMidYMid meet'
    );

    w.innerHTML='';

    w.appendChild(clone);

  });

}

function renderTeams(teams, teamSize, subsPerTeam) {

  const teamNames = [
    "The Five-Hole Fiddlers",
    "Goal Diggers",
    "Ball Blazers",
    "Stick Flickers",
    "The Mighty Dangles",
    "Deez Sticks",
    "Floor Fury",
    "The Dirty Dekes",
    "Stickflix and Chill",
    "The Deflectors",
    "Ballz Deep",
    "Just the Tip-Ins",
    "The Slap and Tickles"
  ];

  shuffle(teamNames);

  const out = document.getElementById("pitch");
  out.innerHTML = ""; // clear previous content

  const pitchHeight = out.clientHeight;
  const pitchWidth = out.clientWidth;

  const teamPositions = [
    { left: "5%", top: "20%" },   // Team 1
    { right: "5%", top: "20%" }   // Team 2
  ];

  teams.forEach((team, i) => {

    const displayName = teamNames[i % teamNames.length];

    let goalie = null;
    let playersOnly = team.slice();

    if (playersOnly[0] && playersOnly[0].includes("(G)")) {
      goalie = playersOnly[0];
      playersOnly = playersOnly.slice(1);
    }

    const subs = subsPerTeam[i] || [];
    const subsVisible = subs.length > 0 ? "visible" : "";
    const colour = teamColourByIndex(i, teams.length);

    // Create team container
    const teamDiv = document.createElement("div");
    teamDiv.className = "team";
    teamDiv.style.setProperty("--team-colour", colour);
    teamDiv.style.position = "absolute";
    teamDiv.style.padding = "12px";
    teamDiv.style.background = "rgba(255,255,255,0.9)";
    teamDiv.style.borderRadius = "12px";
    teamDiv.style.boxShadow = "0 2px 8px rgba(0,0,0,0.15)";
    teamDiv.style.width = "40%";

    // Position teams on pitch
    const pos = teamPositions[i];
    if (pos.left) teamDiv.style.left = pos.left;
    if (pos.right) teamDiv.style.right = pos.right;
    if (pos.top) teamDiv.style.top = pos.top;

    // Team title
    const title = document.createElement("div");
    title.className = "team-title";
    title.textContent = displayName;
    teamDiv.appendChild(title);

    // Formation container
    const formationContainer = document.createElement("div");
    formationContainer.className = "formation-container";

    // Formation layout
    const formationLayout = document.createElement("div");
    formationLayout.className = "formation-layout";

    // Build rows dynamically
    if (teamSize === 3) {
      let top, midL, midR, bottom;
      const goalieTop = i % 2 === 0;
      if (goalieTop) {
        top = goalie;
        midL = playersOnly[0];
        midR = playersOnly[1];
        bottom = playersOnly[2];
      } else {
        top = playersOnly[0];
        midL = playersOnly[1];
        midR = playersOnly[2];
        bottom = goalie;
      }
      formationLayout.innerHTML = `
        ${centeredRow(top)}
        ${twoAcrossRow(midL, midR)}
        ${centeredRow(bottom)}
      `;
    } else if (teamSize === 5) {
      const p = [...playersOnly];
      const g = goalie || "";
      const goalieTop = i % 2 === 0;
      formationLayout.innerHTML = goalieTop
        ? `${centeredRow(g)}${twoAcrossRow(p[0], p[1])}${threeAcrossRow(p[2], p[3], p[4])}`
        : `${threeAcrossRow(p[0], p[1], p[2])}${twoAcrossRow(p[3], p[4])}${centeredRow(g)}`;
    }

    formationContainer.appendChild(formationLayout);

    // Subs section
    const subsDiv = document.createElement("div");
    subsDiv.className = `subs-section ${subsVisible}`;
    subsDiv.innerHTML = `<div style="font-weight:bold;">Subs</div>` + subs
      .map(s => `<div class="sub-card">${formatPlayer(s)}</div>`)
      .join("");
    formationContainer.appendChild(subsDiv);

    teamDiv.appendChild(formationContainer);
    out.appendChild(teamDiv);

    injectShirtsIntoTeam(teamDiv);

  });
}

/* remaining helpers unchanged */

function threeAcrossRow(l,m,r){
  return `
<div class="row-three">
${[l,m,r].map(x=>`
<div class="player-block">

<div class="player-icon
${x&&x.includes('(G)')
?' goalie':''}">

<div class="shirt-icon"></div>

</div>

<div class="player-name">

${formatPlayer(x)}

</div>

</div>`).join("")}
</div>`;
}

function centeredRow(p){
  return p?`
<div class="row-center">

<div class="player-icon
${p.includes('(G)')
?' goalie':''}">

<div class="shirt-icon"></div>

</div>

<div class="player-name">

${formatPlayer(p)}

</div>

</div>`:
`<div class="row-center">
<div style="height:46px"></div>
</div>`;
}

function twoAcrossRow(l,r){
  return `
<div class="row-two">

<div class="player-block">

<div class="player-icon
${l&&l.includes('(G)')
?' goalie':''}">

<div class="shirt-icon"></div>

</div>

<div class="player-name">

${formatPlayer(l)}

</div>

</div>

<div class="player-block">

<div class="player-icon
${r&&r.includes('(G)')
?' goalie':''}">

<div class="shirt-icon"></div>

</div>

<div class="player-name">

${formatPlayer(r)}

</div>

</div>

</div>`;
}

function formatPlayer(p){

  if(!p)return"";

  return p.includes("(G)")
  ?`🥅 ${p.replace("(G)","").trim()}`
  :p;

}

function saveTeamsAsImage(){

  const o=
  document.getElementById("output");

  if(!o.innerText.trim()){

    alert("No teams to save yet!");

    return;

  }

  html2canvas(
    o,
    {
      backgroundColor:'#f9f9f9',
      scale:2
    }
  ).then(c=>{

    const l=
    document.createElement("a");

    l.download=
    "floorball_teams.png";

    l.href=
    c.toDataURL("image/png");

    l.click();

  });

}

function shareTeams(){

  const o=
  document
  .getElementById("output")
  .innerText.trim();

  if(!o){

    alert("No teams to share yet!");

    return;

  }

  if(navigator.share){

    navigator.share({
      title:"Floorball Teams",
      text:o
    });

  }

}
